[mypy]
# Target Python version — must match the union-type syntax (str | Path) used
# throughout the codebase, which requires 3.10+.
python_version = 3.11

# Ignore third-party libraries without bundled stubs (pandas, matplotlib, etc.)
# This prevents hundreds of spurious errors from the data-science stack while
# still catching type errors in our own code.
ignore_missing_imports = True

# Require explicit return types on all non-trivial functions.
disallow_untyped_defs = True

# Warn when a cast or ignore comment is no longer needed.
warn_unused_ignores = True
warn_redundant_casts = True

# Do not fail on functions that return Any (common with pandas).
warn_return_any = False

# Stricter checks that are still practical for a data-science project.
check_untyped_defs = True
no_implicit_optional = True

# Exclude the tests directory from strict checking (fixtures use Any frequently).
exclude = tests/
